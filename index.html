function layout(){
  G.hudH   = Math.max(40, H*0.065);
  const avail = H - G.hudH;
  G.topH   = avail * 0.52;
  G.botH   = avail * 0.48;
  G.splitY = G.hudH + G.topH;
  G.slotW  = W / MAX_CUSTOMERS;
 
  const leftW  = W * 0.30;
  const centerW = W * 0.40;
  
  G.centerX = leftW;
  G.centerW = centerW;
  G.plateCX = leftW + centerW / 2;
  G.plateCY = G.splitY + G.botH * 0.42;
  G.plateR  = Math.min(centerW * 0.36, G.botH * 0.30);
}

function px(x,y,w,h,c){ CX.fillStyle=c; CX.fillRect(~~x,~~y,~~w,~~h); }
function txt(t,x,y,c,sz,a='left'){ CX.fillStyle=c; CX.font=`${sz}px 'Press Start 2P'`; CX.textAlign=a; CX.textBaseline='top'; CX.fillText(t,~~x,~~y); }
function rnd(x,y,w,h,r,fill,stroke=null,sw=2){ CX.beginPath(); CX.moveTo(x+r,y); CX.lineTo(x+w-r,y); CX.quadraticCurveTo(x+w,y,x+w,y+r); CX.lineTo(x+w,y+h-r); CX.quadraticCurveTo(x+w,y+h,x+w-r,y+h); CX.lineTo(x+r,y+h); CX.quadraticCurveTo(x,y+h,x,y+h-r); CX.lineTo(x,y+r); CX.quadraticCurveTo(x,y,x+r,y); CX.closePath(); CX.fillStyle=fill; CX.fill(); if(stroke){CX.strokeStyle=stroke;CX.lineWidth=sw;CX.stroke();} }
 
function drawBackground(){
  if(bgImg.complete && bgImg.naturalWidth>0){
    const scale = Math.max(W/bgImg.naturalWidth, H/bgImg.naturalHeight);
    const iw = bgImg.naturalWidth*scale, ih = bgImg.naturalHeight*scale;
    const ix = (W-iw)/2, iy = (H-ih)/2;
    CX.drawImage(bgImg, ix, iy, iw, ih);
    G.bgRect = { ix, iy, iw, ih };
 
    if(DEBUG_HITBOXES){
      for(const [id, box] of Object.entries(HITBOXES)){
        CX.strokeStyle = 'rgba(255, 0, 0, 0.5)';
        CX.lineWidth = 2;
        CX.strokeRect(ix + box.x * iw, iy + box.y * ih, box.w * iw, box.h * ih);
        txt(id, ix + box.x * iw, iy + box.y * ih, 'red', 8);
      }
    }
  } else {
    CX.fillStyle='#1A1028'; CX.fillRect(0,0,W,H);
  }
}

function drawTopArea(){ for(let s=0;s<MAX_CUSTOMERS;s++){ const slotX = s * G.slotW; const cust = G.customers.find(c=>c.slot===s && c.state!=='done'); drawCustomerPanel(slotX, G.hudH, G.slotW, G.topH, cust, s); } }
function drawCustomerPanel(x, y, w, h, cust, slotIdx){ 
  const isEmpty = !cust; 
  if(isEmpty){ txt('WAITING...', x+w/2, y+h/2-6, '#3A2858', 7, 'center'); return; } 
  const custX = x + w/2 + (cust.state==='walking_in' ? cust.slideOffset : 0); 
  drawBust(custX, y+h, w, h, cust); 
  if(cust.state==='at_counter'){ 
    drawOrderBubble(cust, x, y, w, h); 
    // NEW: Vertical patience bar to the right of the person
    drawVerticalPatienceBar(x + w * 0.85, y + h * 0.25, 8, h * 0.45, cust);
  } 
  if(cust.state==='walking_out'){ drawBagFloat(custX, y+h*0.35, cust); } 
}
 
function drawVerticalPatienceBar(x, y, w, h, cust){
  CX.fillStyle='rgba(0,0,0,0.4)'; 
  CX.fillRect(x, y, w, h);
  const pct = Math.max(0, cust.patience)/100;
  const barH = h * pct;
  const c = pct > 0.6 ? '#4CAF50' : pct > 0.3 ? '#FF9800' : '#E53935';
  CX.fillStyle = c;
  // Draw from bottom up
  CX.fillRect(x, y + (h - barH), w, barH);
  CX.strokeStyle = 'rgba(255,255,255,0.3)';
  CX.lineWidth = 1;
  CX.strokeRect(x, y, w, h);
}
 
function drawBust(cx, footY, panelW, panelH, cust){ const pal = cust.palette; const scale = panelH * 0.68 / 120; const S = scale; const bob = cust.state==='at_counter' ? Math.sin(Date.now()/300+cust.id)*3 : 0; const baseY = footY - 8 + bob; function b(ux,uy,uw,uh,col,outline=null){ const px2=~~(cx+(ux-60)*S), py2=~~(baseY+uy*S); const pw2=~~(uw*S+0.5), ph2=~~(uh*S+0.5); CX.fillStyle=col; CX.fillRect(px2,py2,pw2,ph2); if(outline){ CX.strokeStyle=outline; CX.lineWidth=Math.max(1,~~(S*0.8)); CX.strokeRect(px2,py2,pw2,ph2); } } const OL = pal.outline; b(22,-80,36,50,pal.shirt,OL); b(34,-82,12,8,pal.skin,OL); b(22,-80,5,50,'rgba(0,0,0,0.15)'); b(53,-80,5,50,'rgba(0,0,0,0.1)'); b(42,-70,6,10,'rgba(255,255,255,0.15)'); b(38,-66,4,3,'rgba(255,255,255,0.2)'); b(38,-59,4,3,'rgba(255,255,255,0.2)'); b(36,-90,8,12,pal.skin,OL); b(18,-148,44,60,pal.skin,OL); b(18,-148,5,60,'rgba(0,0,0,0.1)'); b(57,-148,5,60,'rgba(0,0,0,0.1)'); b(18,-148,44,4,'rgba(0,0,0,0.07)'); b(14,-130,6,14,pal.skin,OL); b(60,-130,6,14,pal.skin,OL); const hs = cust.hairStyle; if(hs===0){ b(16,-158,48,18,pal.hair,OL); b(18,-152,12,8,pal.hair); b(52,-152,10,8,pal.hair); b(16,-148,6,8,pal.hair); b(58,-148,6,8,pal.hair); } else if(hs===1){ b(14,-162,52,22,pal.hair,OL); b(14,-148,8,20,pal.hair); b(58,-148,8,20,pal.hair); b(37,-163,6,5,'rgba(255,255,255,0.2)'); } else if(hs===2){ b(16,-168,48,28,pal.hair,OL); b(12,-164,6,14,pal.hair,OL); b(62,-164,6,14,pal.hair,OL); b(22,-172,8,10,pal.hair,OL); b(38,-175,10,12,pal.hair,OL); b(50,-170,8,10,pal.hair,OL); } else if(hs===3){ b(16,-158,48,16,pal.hair,OL); b(14,-148,6,16,pal.hair,OL); b(60,-148,6,16,pal.hair,OL); b(30,-170,20,18,pal.hair,OL); rnd(~~(cx+(30-60)*S),~~(baseY-170*S),~~(20*S),~~(18*S),~~(4*S),pal.hair,OL,1); } else { b(16,-158,48,12,pal.hair,OL); b(10,-168,60,12,pal.hair,OL); b(20,-188,40,24,pal.hair,OL); b(30,-189,20,4,'rgba(255,255,255,0.15)'); } const eyeY = -118; b(24,eyeY,14,12,'#FFFFFF'); b(42,eyeY,14,12,'#FFFFFF'); b(27,eyeY+2,8,8,pal.eye==='#1A4080'?'#2060B0':'#3A2010'); b(45,eyeY+2,8,8,pal.eye==='#1A4080'?'#2060B0':'#3A2010'); b(29,eyeY+3,5,6,'#080808'); b(47,eyeY+3,5,6,'#080808'); b(30,eyeY+3,2,2,'rgba(255,255,255,0.9)'); b(48,eyeY+3,2,2,'rgba(255,255,255,0.9)'); b(24,eyeY,14,3,pal.hair); b(42,eyeY,14,3,pal.hair); const browY = cust.patience>50 ? eyeY-8 : eyeY-6; const browTilt = cust.patience<30 ? 2 : 0; b(24,browY-browTilt,14,4,pal.hair); b(42,browY+browTilt,14,4,pal.hair); b(37,-105,6,6,shadeColor(pal.skin,-20)); const mouthY = -92; if(cust.state==='walking_out'){ b(28,mouthY,24,6,'#C04050'); b(30,mouthY+2,20,4,'#FF6070'); b(28,mouthY,4,4,pal.skin); b(48,mouthY,4,4,pal.skin); b(30,mouthY,4,4,'#FFFFFF'); b(35,mouthY,4,4,'#FFFFFF'); b(40,mouthY,4,4,'#FFFFFF'); b(45,mouthY,4,4,'#FFFFFF'); } else if(cust.patience>65){ b(28,mouthY,24,5,'#C04050'); b(30,mouthY+1,20,4,'#E06070'); b(28,mouthY+2,3,3,pal.skin); b(49,mouthY+2,3,3,pal.skin); } else if(cust.patience>30){ b(28,mouthY+2,24,4,'#A03040'); b(28,mouthY+2,3,4,pal.skin); b(49,mouthY+2,3,4,pal.skin); } else { b(28,mouthY+4,24,4,'#901828'); b(28,mouthY+2,4,4,pal.skin); b(48,mouthY+2,4,4,pal.skin); b(16,-138,3,8,'#E53935'); b(62,-138,3,8,'#E53935'); b(14,-140,8,3,'#E53935'); b(58,-140,8,3,'#E53935'); CX.fillStyle='#64B5F6'; CX.beginPath(); CX.arc(~~(cx+28*S),~~(baseY-155*S),~~(3*S),0,Math.PI*2); CX.fill(); } b(16,-108,12,8,pal.blush+'44'); b(52,-108,12,8,pal.blush+'44'); }
function shadeColor(hex,amt){ const n=parseInt(hex.slice(1),16); const r=Math.max(0,Math.min(255,(n>>16)+amt)); const g=Math.max(0,Math.min(255,((n>>8)&0xff)+amt)); const b2=Math.max(0,Math.min(255,(n&0xff)+amt)); return `#${((1<<24)+(r<<16)+(g<<8)+b2).toString(16).slice(1)}`; }
function drawOrderBubble(cust,x,y,w,h){ const order = cust.order; const iSz = Math.min(22, w*0.08); const pad = 6; const bw = order.length*(iSz+3)+pad*2; const bh = iSz+pad*2+4; const bx = x+w/2-bw/2; const by = y+12; CX.fillStyle='rgba(0,0,0,0.3)'; CX.beginPath(); bblPath(CX,bx+2,by+2,bw,bh,x+w/2,8); CX.fill(); const up = cust.patience<30 ? 0.5+0.5*Math.sin(Date.now()/150) : 1; CX.fillStyle=`rgba(255,253,231,${up})`; CX.beginPath(); bblPath(CX,bx,by,bw,bh,x+w/2,8); CX.fill(); CX.strokeStyle=cust.patience<30?'#E53935':'#8B4513'; CX.lineWidth=2.5; CX.stroke(); order.forEach((ing,i)=>{ const ix = bx+pad+i*(iSz+3); const iy = by+pad+2; CX.font=`${iSz}px serif`; CX.textAlign='left'; CX.textBaseline='top'; CX.fillText(ing.icon, ix, iy); }); }
function bblPath(ctx,x,y,w,h,tx,r){ ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(tx+6,y+h); ctx.lineTo(tx,y+h+14); ctx.lineTo(tx-6,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }
function drawBagFloat(cx,y,cust){ const sz=48; rnd(cx-sz/2,y,sz,sz*1.1,5,'#E8D090','#A89040',2); CX.strokeStyle='#A89040'; CX.lineWidth=2; CX.beginPath(); CX.moveTo(cx-sz/2+4,y); CX.quadraticCurveTo(cx,y-16,cx+sz/2-4,y); CX.stroke(); CX.font='22px serif'; CX.textAlign='center'; CX.textBaseline='middle'; CX.fillText('🥪',cx,y+sz*0.6); txt('ENJOY!',cx,y+sz*1.15,'#FFD700',5,'center'); }

function drawPlateArea(){
  const cx2=G.plateCX, cy=G.plateCY, r=G.plateR, cY=G.splitY+6, cW=G.centerW;
  txt('YOUR PLATE',cx2,cY+8,'#FFD700',6,'center');
  
  // Plate shadow and body
  CX.fillStyle='rgba(0,0,0,0.15)'; CX.beginPath(); CX.ellipse(cx2+4,cy+6,r+4,r*0.36,0,0,Math.PI*2); CX.fill();
  const pg=CX.createRadialGradient(cx2-r*0.2,cy-r*0.12,2,cx2,cy,r);
  pg.addColorStop(0,'#F8F4EC'); pg.addColorStop(0.7,'#EEE8DC'); pg.addColorStop(1,'#C8C0B0');
  CX.fillStyle=pg; CX.beginPath(); CX.ellipse(cx2,cy,r,r*0.34,0,0,Math.PI*2); CX.fill();
  CX.strokeStyle='#A09080'; CX.lineWidth=2; CX.stroke();
 
  if(G.plate.length===0){ 
    txt('EMPTY',cx2,cy-8,'#9A7850',7,'center'); 
    txt('CLICK INGREDIENTS',cx2,cy+6,'#786040',5,'center'); 
  } else { 
    drawSandwich(cx2,cy,r); 
  }
 
  const btnW=cW*0.55, btnH=30, btnX=cx2-btnW/2, btnY=cY+G.botH-btnH-14;
  const hovSrv=G.mouse&&G.mouse.x>=btnX&&G.mouse.x<=btnX+btnW&&G.mouse.y>=btnY&&G.mouse.y<=btnY+btnH;
  rnd(btnX,btnY,btnW,btnH,5,hovSrv?'#22AA22':'#1A8A1A','#0A5A0A',2);
  txt('▶  SERVE!',cx2,btnY+9,'#FFFFFF',8,'center');
 
  const clrW=cW*0.44, clrH=20, clrX=cx2-clrW/2, clrY=btnY-clrH-6;
  const hovClr=G.mouse&&G.mouse.x>=clrX&&G.mouse.x<=clrX+clrW&&G.mouse.y>=clrY&&G.mouse.y<=clrY+clrH;
  rnd(clrX,clrY,clrW,clrH,4,hovClr?'#6A2A10':'#4A1A08','#2A0A04',1);
  txt('✕  CLEAR',cx2,clrY+5,'#C8A888',6,'center');
 
  G.serveBtn={x:btnX,y:btnY,w:btnW,h:btnH}; G.clearBtn={x:clrX,y:clrY,w:clrW,h:clrH};
}

const LH={bread:22,wavy:12,flat:10,drip:7,ring:9,bacon:9,egg:12};
const LT={bread:'bread',lettuce:'wavy',tomato:'flat',cheese:'flat',ham:'flat',turkey:'flat',ketchup:'drip',mustard:'drip',onion:'ring',pickle:'flat',bacon:'bacon',avocado:'flat',egg:'egg',spinach:'wavy'};
const LC={bread:['#D4900F','#8B5A0A','#F0B030'],lettuce:['#3A7A30','#1E5020','#60C050'],tomato:['#CC2A2A','#881010','#FF6060'],cheese:['#F0B800','#B08000','#FFE060'],ham:['#C06070','#904050','#E090A0'],turkey:['#A08060','#705040','#C0A080'],ketchup:['#CC2A2A','#881010','#FF6060'],mustard:['#D4A800','#A07800','#FFD020'],onion:['#9060B8','#603090','#C090E8'],pickle:['#3A8830','#205820','#70C860'],bacon:['#A03020','#701010','#D05040'],avocado:['#5A9828','#305810','#8ACC48'],egg:['#F8E840','#C0A800','#FFF880'],spinach:['#2A6830','#144018','#50A848']};
 
function drawSandwich(cx,cy,plateR){
  const w=plateR*1.55; const tH=G.plate.reduce((s,i)=>s+(LH[LT[i.id]]||10),0);
  let y=cy+plateR*0.12+tH/2;
  G.plate.forEach(ing=>{
    const t=LT[ing.id]||'flat', h=LH[t]||10; const [mc,ec,sc]=LC[ing.id]||['#aaa','#666','#ccc'];
    CX.save();
    switch(t){
      case'bread':{const g=CX.createLinearGradient(cx,y-h,cx,y);g.addColorStop(0,sc);g.addColorStop(0.4,mc);g.addColorStop(1,ec);CX.fillStyle=g;rr(cx-w/2+5,y-h,w-10,h,[5,5,0,0]);CX.fill();CX.strokeStyle=ec;CX.lineWidth=1.5;CX.stroke();break;}
      case'wavy':{for(let l=0;l<3;l++){const off=(l-1)*7,lw=w-14+l*4;CX.fillStyle=l===1?mc:ec;CX.beginPath();CX.moveTo(cx-lw/2+off,y);wl(cx-lw/2+off,y,cx+lw/2+off,y,4,11);CX.lineTo(cx+lw/2+off,y-h);wl(cx+lw/2+off,y-h,cx-lw/2+off,y-h,5,9);CX.closePath();CX.fill();}break;}
      case'flat':{const g=CX.createLinearGradient(cx,y-h,cx,y);g.addColorStop(0,sc);g.addColorStop(1,ec);CX.fillStyle=g;CX.beginPath();CX.moveTo(cx-w/2+9,y);wl(cx-w/2+9,y,cx+w/2-9,y,1.5,16);CX.lineTo(cx+w/2-9,y-h);wl(cx+w/2-9,y-h,cx-w/2+9,y-h,1.2,18);CX.closePath();CX.fill();CX.strokeStyle=ec;CX.lineWidth=1;CX.stroke();break;}
      case'drip':{CX.fillStyle=mc;CX.fillRect(cx-w/2+9,y-h,w-18,h);break;}
      case'ring':{const n=3,rw=(w-24)/n;for(let r2=0;r2<n;r2++){const rx=cx-(w/2-16)+r2*rw+rw/2;CX.strokeStyle=mc;CX.lineWidth=4;CX.beginPath();CX.ellipse(rx,y-h/2,rw*.36,h*.4,0,0,Math.PI*2);CX.stroke();}}break;
      case'bacon':{for(let s=0;s<3;s++){const by=y-h/2+(s-1)*(h*.26);CX.strokeStyle=s%2===0?mc:ec;CX.lineWidth=h*.26;CX.lineCap='round';CX.beginPath();CX.moveTo(cx-w/2+16,by);wl(cx-w/2+16,by,cx+w/2-16,by,2.5,24);CX.stroke();}break;}
      case'egg':{CX.fillStyle='#F8F5E8';CX.beginPath();CX.ellipse(cx,y-h/2,w*.28,h*.44,0,0,Math.PI*2);CX.fill();CX.fillStyle='#F8B800';CX.beginPath();CX.ellipse(cx,y-h/2,h*.2,h*.2,0,0,Math.PI*2);CX.fill();break;}
    }
    CX.font="bold 5px 'Press Start 2P'";CX.textAlign='center';CX.textBaseline='middle';
    CX.fillStyle='rgba(0,0,0,0.5)';CX.fillText(ing.label,cx+1,y-h/2+1);
    CX.fillStyle='rgba(255,255,255,0.85)';CX.fillText(ing.label,cx,y-h/2);
    CX.restore(); y-=h;
  });
}
function wl(x1,y1,x2,y2,amp,freq){ const d=x2-x1,steps=Math.ceil(d/freq); for(let i=0;i<=steps;i++){const t=i/steps,x=x1+t*d,y=y1+(y2-y1)*t+Math.sin(t*Math.PI*2*(d/freq))*amp;i===0?CX.moveTo(x,y):CX.lineTo(x,y);} }
function rr(x,y,w,h,r){const[tl,tr,br,bl]=r;CX.beginPath();CX.moveTo(x+tl,y);CX.lineTo(x+w-tr,y);CX.quadraticCurveTo(x+w,y,x+w,y+tr);CX.lineTo(x+w,y+h-br);CX.quadraticCurveTo(x+w,y+h,x+w-br,y+h);CX.lineTo(x+bl,y+h);CX.quadraticCurveTo(x,y+h,x,y+h-bl);CX.lineTo(x,y+tl);CX.quadraticCurveTo(x,y,x+tl,y);CX.closePath();}
 
// ══════════════════════════════════════════════
//  HUD & FLOW
// ══════════════════════════════════════════════
function drawHUD(){ const h=G.hudH; CX.fillStyle='rgba(8,4,18,0.88)'; CX.fillRect(0,0,W,h); px(0,h-3,W,3,'#FFD700'); txt('⭐',16,12,'#FFD700',14); txt(String(G.score),40,13,'#FFD700',11); txt(`⏱ ${G.timer}s`,W/2,12,G.timer<=15?'#E53935':'#FFFFFF',10,'center'); txt(`LV ${G.level} ✓${G.served} ✗${G.missed}`,W-10,12,'#4CAF50',8,'right'); }
function drawFloats(){ G.floats=G.floats.filter(f=>f.life>0); G.floats.forEach(f=>{ CX.globalAlpha=Math.min(1,f.life/25); txt(f.t,f.x,f.y,f.c,10,'center'); CX.globalAlpha=1; f.y-=1.4; f.life--; }); }
function addFloat(t,x,y,c='#FFD700'){ G.floats.push({t,x,y,c,life:55}); }
function drawGameOver(){ CX.fillStyle='rgba(0,0,0,0.85)'; CX.fillRect(0,0,W,H); rnd(W/2-170,H/2-120,340,240,10,'#0A0520','#FFD700',3); txt('DELI CLOSED!',W/2,H/2-100,'#FFD700',15,'center'); txt(`SCORE: ${G.score}`,W/2,H/2-24,'#FFD700',12,'center'); const bw=170,bh=38,btnX=W/2-bw/2,btnY=H/2+38; const hov=G.mouse&&G.mouse.x>=btnX&&G.mouse.x<=btnX+bw&&G.mouse.y>=btnY&&G.mouse.y<=btnY+bh; rnd(btnX,btnY,bw,bh,6,hov?'#2AAA2A':'#1A8A1A','#0A5A0A',2); txt('▶ PLAY AGAIN',W/2,btnY+13,'#fff',8,'center'); G._restart={x:btnX,y:btnY,w:bw,h:bh}; }
 
function frame(){ layout(); CX.clearRect(0,0,W,H); drawBackground(); drawTopArea(); drawWorkspace(); drawHUD(); drawFloats(); if(!G.running) drawGameOver(); G.raf=requestAnimationFrame(frame); }
 
function genOrder(){
  const n = Math.max(3, 2 + Math.floor(Math.random() * (1 + G.level)));
  const pool = [...INGREDIENTS].filter(i => i.id !== 'bread');
  const fill = pool.sort(() => Math.random() - .5).slice(0, n - 2);
  const br = INGREDIENTS.find(i => i.id === 'bread');
  return [br, ...fill, br];
}
 
function spawnCustomer(){
  if(!G.running) return;
  const used=new Set(G.customers.filter(c=>c.state!=='done').map(c=>c.slot));
  if(used.size>=MAX_CUSTOMERS) return;
  let slot=-1; for(let s=0;s<MAX_CUSTOMERS;s++) if(!used.has(s)){slot=s;break;}
  if(slot===-1) return;
  G.customers.push({ id:Date.now()+Math.random(), name:NAMES[~~(Math.random()*NAMES.length)], palette:PALETTES[~~(Math.random()*PALETTES.length)], hairStyle:~~(Math.random()*5), order:genOrder(), patience:100, patienceRate:PATIENCE_RATE+(G.level-1)*0.02, slot, state:'walking_in', slideOffset: -G.slotW*0.7 });
}
 
function updateCustomers(){
  G.customers.forEach(c=>{ if(c.state==='walking_in'){ c.slideOffset+=3.5; if(c.slideOffset>=0){ c.slideOffset=0; c.state='at_counter'; } } else if(c.state==='walking_out'){ c.slideOffset+=5.6; if(c.slideOffset>G.slotW){ c.state='done'; } } });
  G.customers=G.customers.filter(c=>c.state!=='done');
}
 
function tickPatience(){
  G.customers.forEach(c=>{ if(c.state!=='at_counter') return; c.patience-=c.patienceRate; if(c.patience<=0){ G.missed++; G.combo=0; G.score=Math.max(0,G.score-30); addFloat(`${c.name} LEFT!`, c.slot*G.slotW+G.slotW/2, G.hudH+G.topH*0.3,'#E53935'); c.state='walking_out'; c.slideOffset=0; } });
}
 
function serve() {
  if (!G.plate.length) return;
  const at=G.customers.filter(c=>c.state==='at_counter').sort((a,b)=>a.slot-b.slot);
  if(!at.length) return;
  const c = at[0];
  let m=0; if(G.plate.length===c.order.length){ for(let i=0;i<c.order.length;i++) if(G.plate[i].id===c.order[i].id) m++; }
  if (m===c.order.length) {
    G.combo++; G.score+=100+(~~c.patience/2); G.served++; G.level=1+Math.floor(G.served/5);
    addFloat(`PERFECT!`, c.slot*G.slotW+G.slotW/2, G.hudH+G.topH*0.25, '#FFD700');
    c.state='walking_out'; c.slideOffset=0; G.plate=[];
  } else {
    G.score=Math.max(0, G.score-20); addFloat('WRONG!', c.slot*G.slotW+G.slotW/2, G.hudH+G.topH*0.25, '#E53935');
  }
}
 
CV.addEventListener('click',e=>{
  tryStartMusic(); // fires on ANY click, guaranteed user interaction
  const r=CV.getBoundingClientRect(); const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  if(!G.running){ if(G._restart&&mx>=G._restart.x&&mx<=G._restart.x+G._restart.w&&my>=G._restart.y&&my<=G._restart.y+G._restart.h) startGame(); return; }
  if(G.serveBtn&&mx>=G.serveBtn.x&&mx<=G.serveBtn.x+G.serveBtn.w&&my>=G.serveBtn.y&&my<=G.serveBtn.y+G.serveBtn.h){ serve(); return; }
  if(G.clearBtn&&mx>=G.clearBtn.x&&mx<=G.clearBtn.x+G.clearBtn.w&&my>=G.clearBtn.y&&my<=G.clearBtn.y+G.clearBtn.h){ G.plate=[]; return; }
  
  if(G.bgRect) {
    const { ix, iy, iw, ih } = G.bgRect;
    for(const [id, box] of Object.entries(HITBOXES)){
      const hx = ix + box.x * iw;
      const hy = iy + box.y * ih;
      const hw = box.w * iw;
      const hh = box.h * ih;
      if(mx >= hx && mx <= hx + hw && my >= hy && my <= hy + hh){
        const ing = INGREDIENTS.find(i => i.id === id);
        if(ing) G.plate.push(ing);
        return;
      }
    }
  }
 
  if(Math.sqrt((mx-G.plateCX)**2+((my-G.plateCY)/0.34)**2)<G.plateR+16&&G.plate.length>0) G.plate.pop();
});
 
CV.addEventListener('mousemove',e=>{ const r=CV.getBoundingClientRect(); G.mouse={x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)}; });
 
function startGame(){
  cancelAnimationFrame(G.raf); clearInterval(G.tInt); clearInterval(G.pInt); clearInterval(G.spawnInt); clearInterval(G.upInt);
  Object.assign(G,{score:0,level:1,served:0,missed:0,combo:0,timer:120,running:true,plate:[],customers:[],floats:[]});
  spawnCustomer();
  G.tInt=setInterval(()=>{ if(G.running){ G.timer--; if(G.timer<=0) G.running=false; } },1000);
  G.pInt=setInterval(()=>{ if(G.running) tickPatience(); },600);
  G.upInt=setInterval(()=>{ if(G.running) updateCustomers(); },16);
  G.spawnInt=setInterval(()=>{ if(G.running) spawnCustomer(); },SPAWN_INTERVAL);
  G.raf=requestAnimationFrame(frame);
}
 
startGame();
</script>
